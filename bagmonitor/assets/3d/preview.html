<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>BagMonitor Tag — 3D Preview</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #eef2f7; display: flex; align-items: center; justify-content: center; height: 100vh; font-family: system-ui; }
    canvas { display: block; }
    #info { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            color: rgba(20,30,50,0.45); font-size: 13px; }
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <div id="info">drag to rotate · scroll to zoom</div>
  <script type="importmap">
    { "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.166.1/build/three.module.js",
                   "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.166.1/examples/jsm/" } }
  </script>
  <script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';

    const canvas   = document.getElementById('c');
    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
    renderer.setSize(innerWidth, innerHeight);
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.1;

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xeef2f7);

    // Soft studio reflections — gives white plastic its product-shot look
    const pmrem = new THREE.PMREMGenerator(renderer);
    scene.environment = pmrem.fromScene(new RoomEnvironment(), 0.04).texture;

    const camera = new THREE.PerspectiveCamera(35, innerWidth / innerHeight, 0.1, 1000);
    camera.position.set(8, 6, 48);

    const controls = new OrbitControls(camera, canvas);
    controls.enableDamping = true;
    controls.dampingFactor = 0.06;
    controls.autoRotate = true;
    controls.autoRotateSpeed = 1.4;
    controls.target.set(0, 2, 0);

    // A gentle key light on top of the environment for soft shadow gradient
    const key = new THREE.DirectionalLight(0xffffff, 1.1);
    key.position.set(20, 30, 25);
    scene.add(key);

    const MODEL = new URLSearchParams(location.search).get('model') || 'bagmonitor-tag.glb';
    new GLTFLoader().load('./' + MODEL, gltf => {
      const model = gltf.scene;
      let box = new THREE.Box3().setFromObject(model);
      const size = box.getSize(new THREE.Vector3());
      const maxDim = Math.max(size.x, size.y, size.z) || 1;
      model.scale.setScalar(22 / maxDim);
      box = new THREE.Box3().setFromObject(model);
      model.position.sub(box.getCenter(new THREE.Vector3()));
      model.position.y += 2;
      scene.add(model);
    });

    addEventListener('resize', () => {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
    });

    (function animate() {
      requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);
    })();
  </script>
</body>
</html>
